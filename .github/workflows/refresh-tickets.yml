name: Refresh ticket data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show files
        run: ls -la

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests beautifulsoup4 lxml

      - name: Test bs4 install
        run: python -c "from bs4 import BeautifulSoup; print('bs4 works')"

      - name: Fetch tickets
        env:
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
        run: python scripts/fetch_tickets.py

      - name: Commit updated tickets
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/tickets.json
          git commit -m "Refresh ticket data" || echo "No changes to commit"
          git push
